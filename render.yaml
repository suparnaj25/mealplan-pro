services:
  - type: web
    name: mealplan-pro
    runtime: node
    plan: starter
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install --build-from-source
    startCommand: cd server && node src/db/migrate.js && node src/db/seed.js && node src/db/seed-additional.js && node src/db/seed-more.js && node src/index.js
    disk:
      name: mealplan-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /data